name: 发布静态站点

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  构建:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 整理站点文件
        run: |
          mkdir public
          cp index.html public/
          cp styles.css public/
          cp app.js public/
          cp -R 裁黑边 public/

      - name: 上传站点制品
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  部署:
    needs: 构建
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.部署站点.outputs.page_url }}
    steps:
      - name: 部署站点
        id: 部署站点
        uses: actions/deploy-pages@v4
